<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fascinate&family=Share+Tech&display=swap" rel="stylesheet">
    <script type="module" src="src/main.ts"></script>
</head>
<body>
    <h1>Digital Display</h1>

    <h2>Mode</h2>
    <div class="mode-selector">
        <button class="mode-button" data-mode="static">Static</button>
        <button class="mode-button" data-mode="blank">Blank</button>
    </div>

    <div class="mode-page" data-mode="static" style="display:none">
        <br><br>
        <label for="file-input" id="file-input-label">Upload Image</label>
        <input id="file-input" type="file" name="photo" accept="image/*">
        <br>
        <span id="error" style="display:none"></span>
        <br>
        <img src="" class="preview">
        <span id="processing-label" style="display:none">Processing...<br></span>
        <span id="updating-label" style="display:none"><br><br>Display(s) Updating...<br></span>
        <h2>Uploaded Images</h2>
        <div class="image-list"></div>
        <br>

        <dialog id="confirm-upload-dialog">
            <h1>Upload Image</h1>
            <div id="image-upload-options">
            <select id="fit-input" name="fit">
                <option value="contain">Contain</option>
                <option value="cover">Cover</option>
            </select>
            <br>
            <select id="color-input" name="color">
                <option value="color">Color</option>
                <option value="bw">B&W</option>
            </select>
            <br>
            <select id="background-input" name="background">
                <option value="white">White</option>
                <option value="black">Black</option>
            </select>
            </div>
            <br>
            <button class="file-upload-submit-button">Upload Image</button>
            <button class="file-upload-cancel-button">Cancel</button>
        </dialog>
    </div>

    <div class="mode-page" data-mode="blank" style="display:none">
        <br>
        <h3 class="color-name"></h3>
        <select class="blank-color-dropdown">
            <option value="white">White</option>
            <option value="black">Black</option>
            <option value="red">Red</option>
            <option value="yellow">Yellow</option>
            <option value="green">Green</option>
            <option value="blue">Blue</option>
        </select>
        <br><br>
    </div>


    <div class="commit-container" style="display:none">
        <button class="reset-button">Reset</button>
        <button class="commit-button">Apply</button>
    </div>
</body>
</html>
